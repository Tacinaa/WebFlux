services:
  postgres:
    image: postgres:16
    container_name: exercice13-postgres
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_products:/var/lib/postgresql/data

volumes:
  postgres_data_products: